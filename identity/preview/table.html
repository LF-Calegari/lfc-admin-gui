<!doctype html><html><head><meta charset="utf-8"><title>Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .wrap{border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:#ECEFE0}
  th{padding:9px 14px;text-align:left;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#6E8164;border-bottom:1px solid var(--border-subtle)}
  tbody tr{border-bottom:1px solid var(--border-subtle)}
  tbody tr:last-child{border-bottom:none}
  td{padding:10px 14px;color:#4A5E42;vertical-align:middle}
  td:first-child{color:#1B2A12;font-weight:500}
  .mono{font-family:var(--font-mono);font-size:11px;color:#6E8164}
  .bd{display:inline-flex;align-items:center;gap:6px;padding:2px 9px;font-family:var(--font-mono);font-size:11px;border-radius:9999px;border:1px solid}
  .bd::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
  .success{background:rgba(122,158,40,0.14);color:#5A7D1F;border-color:rgba(174,202,89,0.25)}
  .danger{background:rgba(217,95,95,0.1);color:#D95F5F;border-color:rgba(217,95,95,0.25)}
  .neutral{background:#ECEFE0;color:#4A5E42;border-color:rgba(22,36,15,0.16)}
  .neutral::before{display:none}
</style></head><body>
<div class="wrap">
  <table>
    <thead><tr><th>Usuário</th><th>Role</th><th>Permissões</th><th>Status</th><th>Última sessão</th></tr></thead>
    <tbody>
      <tr><td>admin@lfc.com.br</td><td><span class="bd neutral">root</span></td><td><span class="mono">12 permissões</span></td><td><span class="bd success">Ativo</span></td><td><span class="mono">há 2 min</span></td></tr>
      <tr><td>ops@lfc.com.br</td><td><span class="bd neutral">admin</span></td><td><span class="mono">8 permissões</span></td><td><span class="bd success">Ativo</span></td><td><span class="mono">há 47 min</span></td></tr>
      <tr><td>legacy@lfc.com.br</td><td><span class="bd neutral">default</span></td><td><span class="mono">3 permissões</span></td><td><span class="bd danger">Inativo</span></td><td><span class="mono">há 14 dias</span></td></tr>
    </tbody>
  </table>
</div>
</body></html>
