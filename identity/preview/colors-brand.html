<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg1)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden}
  .sw{display:flex;flex-direction:column}
  .sw .chip{height:72px}
  .sw .meta{padding:8px 10px;background:var(--bg-surface);border-top:1px solid var(--border-subtle)}
  .sw .n{font-size:11px;font-weight:600}
  .sw .h{font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#16240F"></div><div class="meta"><div class="n" style="color:#DDE9CA"></div><div class="n">Forest</div><div class="h">#16240F</div></div></div>
  <div class="sw"><div class="chip" style="background:#1E3516"></div><div class="meta"><div class="n">Forest Mid</div><div class="h">#1E3516</div></div></div>
  <div class="sw"><div class="chip" style="background:#5B7D47"></div><div class="meta"><div class="n">Hunter</div><div class="h">#5B7D47</div></div></div>
  <div class="sw"><div class="chip" style="background:#8CB139"></div><div class="meta"><div class="n">Green</div><div class="h">#8CB139</div></div></div>
  <div class="sw"><div class="chip" style="background:#AECA59"></div><div class="meta"><div class="n">Lime ★</div><div class="h">#AECA59</div></div></div>
  <div class="sw"><div class="chip" style="background:#809A96"></div><div class="meta"><div class="n">Sage</div><div class="h">#809A96</div></div></div>
  <div class="sw"><div class="chip" style="background:#DDE9CA"></div><div class="meta"><div class="n">Cream</div><div class="h">#DDE9CA</div></div></div>
</div>
</body></html>
