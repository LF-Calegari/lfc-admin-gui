<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg1)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .s{border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden}
  .s .chip{height:68px}
  .s .meta{padding:8px 10px;background:#fff;border-top:1px solid var(--border-subtle)}
  .n{font-size:11px;font-weight:600}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--accent-ink)}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="s"><div class="chip" style="background:#F2F4EA"></div><div class="meta"><div class="tok">--bg-base</div><div class="h">#F2F4EA · page</div></div></div>
  <div class="s"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-subtle)"></div><div class="meta"><div class="tok">--bg-surface</div><div class="h">#FFFFFF · cards</div></div></div>
  <div class="s"><div class="chip" style="background:#ECEFE0"></div><div class="meta"><div class="tok">--bg-elevated</div><div class="h">#ECEFE0 · hover</div></div></div>
  <div class="s"><div class="chip" style="background:#E0E5CD"></div><div class="meta"><div class="tok">--bg-overlay</div><div class="h">#E0E5CD · pressed</div></div></div>
</div>
</body></html>
