<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .scale{border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden}
  .row{display:grid;grid-template-columns:88px 1fr 150px;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border-subtle)}
  .row:last-child{border-bottom:none}
  .meta{font-family:var(--font-mono);font-size:10px}
  .meta .step{color:var(--accent-ink);font-weight:600;font-size:11px}
  .meta .kind{color:var(--fg3)}
  .sample{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--fg3);text-align:right}
</style></head><body>
<div class="scale">
  <div class="row"><div class="meta"><div class="step">3xl</div><div class="kind">H1</div></div><div class="sample" style="font-size:30px;font-weight:700;letter-spacing:-0.03em">Gerenciamento de Roles</div><div class="spec">2.75rem · 700</div></div>
  <div class="row"><div class="meta"><div class="step">2xl</div><div class="kind">H2</div></div><div class="sample" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">Sistemas cadastrados</div><div class="spec">2rem · 600</div></div>
  <div class="row"><div class="meta"><div class="step">xl</div><div class="kind">H3</div></div><div class="sample" style="font-size:20px;font-weight:600;letter-spacing:-0.01em">Rotas por sistema</div><div class="spec">1.5rem · 600</div></div>
  <div class="row"><div class="meta"><div class="step">lg</div><div class="kind">H4</div></div><div class="sample" style="font-size:17px;font-weight:600">Permissões efetivas</div><div class="spec">1.25rem · 600</div></div>
  <div class="row"><div class="meta"><div class="step">base</div><div class="kind">Body</div></div><div class="sample" style="font-size:15px">Atribua permissões diretamente ao usuário.</div><div class="spec">0.9375rem · 400</div></div>
  <div class="row"><div class="meta"><div class="step">sm</div><div class="kind">Small</div></div><div class="sample" style="font-size:13px;color:var(--fg3)">Última atualização há 3 minutos</div><div class="spec">0.8125rem · 400</div></div>
</div>
</body></html>
