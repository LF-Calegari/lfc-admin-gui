<!doctype html><html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg1)}
  .wrap{background:#fff;border:1px solid var(--border-subtle);border-radius:12px;padding:20px;position:relative;overflow:hidden}
  .tag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:12px}
  .big{font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:-0.04em;line-height:1;color:var(--fg1)}
  .big span{color:var(--accent-ink)}
  .alpha{font-size:11px;color:var(--fg3);margin-top:10px;letter-spacing:.02em}
  .bg{position:absolute;right:-10px;top:-20px;font-size:140px;font-weight:700;color:rgba(174,202,89,.06);line-height:1;pointer-events:none}
</style></head><body>
<div class="wrap">
  <div class="bg">Ag</div>
  <div class="tag">Geist · Display / Headings</div>
  <div class="big">Administração <span>segura.</span></div>
  <div class="alpha">Aa Bb Cc Dd Ee Ff Gg Hh · Variable 100–900 · letter-spacing −0.04em</div>
</div>
</body></html>
