<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .wrap{border:1px solid var(--border-subtle);border-radius:12px;padding:14px 18px;background:var(--bg-surface)}
  .row{display:grid;grid-template-columns:90px 140px 50px 1fr;gap:12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:13px}
  .row:last-child{border-bottom:none}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--accent-ink)}
  .bar{background:var(--accent);height:4px;border-radius:2px;opacity:.75}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg3)}
  .use{font-size:12px;color:var(--fg2)}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="tok">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span><span class="use">Gaps mínimos</span></div>
  <div class="row"><span class="tok">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span><span class="use">Padding interno de badges</span></div>
  <div class="row"><span class="tok">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span><span class="use">Gap entre itens de lista</span></div>
  <div class="row"><span class="tok">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span><span class="use">Padding de botões</span></div>
  <div class="row"><span class="tok">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span><span class="use">Gap entre cards · card body</span></div>
  <div class="row"><span class="tok">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span><span class="use">Padding de seção interna</span></div>
  <div class="row"><span class="tok">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span><span class="use">Margem entre seções</span></div>
</div>
</body></html>
