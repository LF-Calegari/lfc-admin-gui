<!doctype html><html><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:1px;background:var(--border-subtle);border:1px solid var(--border-subtle);border-radius:12px;overflow:hidden}
  .i{background:#fff;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px 10px}
  .i svg{width:20px;height:20px;color:#4A5E42;stroke-width:1.5}
  .n{font-family:var(--font-mono);font-size:9px;color:var(--fg3);letter-spacing:.04em}
</style></head><body>
<div class="grid">
  <div class="i"><i data-lucide="monitor"></i><span class="n">systems</span></div>
  <div class="i"><i data-lucide="shuffle"></i><span class="n">routes</span></div>
  <div class="i"><i data-lucide="users"></i><span class="n">roles</span></div>
  <div class="i"><i data-lucide="lock"></i><span class="n">permissions</span></div>
  <div class="i"><i data-lucide="user-plus"></i><span class="n">clients</span></div>
  <div class="i"><i data-lucide="user"></i><span class="n">users</span></div>
  <div class="i"><i data-lucide="activity"></i><span class="n">token</span></div>
  <div class="i"><i data-lucide="log-out"></i><span class="n">logout</span></div>
  <div class="i"><i data-lucide="settings"></i><span class="n">settings</span></div>
  <div class="i"><i data-lucide="search"></i><span class="n">search</span></div>
  <div class="i"><i data-lucide="filter"></i><span class="n">filter</span></div>
  <div class="i"><i data-lucide="plus"></i><span class="n">add</span></div>
  <div class="i"><i data-lucide="pencil"></i><span class="n">edit</span></div>
  <div class="i"><i data-lucide="trash-2"></i><span class="n">delete</span></div>
  <div class="i"><i data-lucide="rotate-ccw"></i><span class="n">restore</span></div>
  <div class="i"><i data-lucide="check"></i><span class="n">check</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
