<head>

<title>lfc-admin · Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="mobile.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, lucide, IOSDevice, IOSStatusBar,
   MobileApp */
const { useState, useEffect } = React;

function Showcase() {
  // stable screen key per device so each device is independent
  return (
    <div className="mobile-stage">
      <div className="mobile-stage__title">
        <div className="mobile-stage__eyebrow">Mobile · UI kit</div>
        <h1>lfc-admin · touch</h1>
        <p>Click-thru recreation of the admin panel on mobile. Drawer nav, bottom-sheet actions, touch-first lists.</p>
      </div>

      <div className="mobile-stage__devices">
        <IOSDevice width={390} height={800} dark={false}>
          <MobileApp initial="systems" />
        </IOSDevice>
        <IOSDevice width={390} height={800} dark={false}>
          <MobileApp initial="users" />
        </IOSDevice>
        <IOSDevice width={390} height={800} dark={false}>
          <MobileApp initial="detail" />
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Showcase />);
</script>
</body>
