name: CI

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - feature/**

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  audit:
    name: Audit (high bloqueante com exceções temporárias)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate security audit report (high)
        run: npm audit --audit-level=high --omit=dev --json > audit-report.json || true

      - name: Enforce audit policy (high/critical)
        run: npm run audit:guard -- --report audit-report.json --exceptions security/audit-exceptions.json
