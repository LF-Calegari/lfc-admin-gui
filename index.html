<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="LFC Admin GUI" />
    <link rel="manifest" href="/manifest.json" />
    <title>LFC Admin GUI</title>
    <script>
      // Anti-FOUC: define `data-theme` no <html> antes do React montar.
      // - Lê preferência persistida em `localStorage` ('lfc-admin-theme'):
      //   * 'light' / 'dark' → escolhas explícitas
      //   * ausente / 'system' → segue prefers-color-scheme do SO
      // - Falha silenciosamente em modo privado / SSR / cota zerada.
      (function () {
        try {
          var stored = globalThis.localStorage.getItem('lfc-admin-theme');
          var explicit = stored === 'light' || stored === 'dark';
          var prefersDark =
            typeof globalThis.matchMedia === 'function' &&
            globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme;
          if (explicit) {
            theme = stored;
          } else if (prefersDark) {
            theme = 'dark';
          } else {
            theme = 'light';
          }
          document.documentElement.dataset.theme = theme;
        } catch (_err) {
          // Anti-FOUC best-effort: em modo privado/SSR/cota zerada caímos
          // em `light` para garantir uma paleta consistente desde o
          // primeiro frame; o React reaplica o tema correto após hidratar.
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
